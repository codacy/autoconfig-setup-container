services:
  codacy-ai:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: codacy/autoconfig
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      # Persist tool installations and Trivy DB across runs
      - codacy-tool-cache:/home/node/.codacy
      # Mount the repo to analyse — override with SOURCE_PATH=/path/to/repo
      - ${SOURCE_PATH:-.}:/workspace
    working_dir: /workspace
    command: local-pipeline.sh
    environment:
      - CODACY_API_TOKEN
      - ANTHROPIC_API_KEY
      - GEMINI_API_KEY
      - JAVA_OPTS=-Xmx1g
    stdin_open: true
    tty: true

volumes:
  codacy-tool-cache:
